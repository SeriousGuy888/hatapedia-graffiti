<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hatapedia graffiti maker</title>

    <script>
        const MAX_UPLOAD_SIZE_BYTES = Number("{{ .MAX_UPLOAD_SIZE_BYTES }}") || 1 << 20
    </script>
    <script defer src="/static/image_upload.js"></script>

    <script type="module" src="/static/scripts/view/canvas_controls_view.js" defer></script>
    <script type="module" src="/static/scripts/view/canvas_view.js" defer></script>
    <script type="module" src="/static/scripts/view/colour_picker_view.js" defer></script>
    <script type="module" src="/static/scripts/view/tool_selection_view.js" defer></script>

    <link rel="stylesheet" href="/static/styles/styles.css">
</head>

<body>
    <h1>hatapedia graffiti maker</h1>

    <h2>upload an image</h2>

    <form action="/image/create" method="post" enctype="multipart/form-data" id="image-upload-form">
        <fieldset>
            <legend>Select an image file to upload:</legend>
            <label for="image-upload-file-input" style="position: absolute; left: -9999px">
                Select an image file to upload:
            </label>
            <input type="file" name="uploaded-image" id="image-upload-file-input" accept="image/*">
        </fieldset>
        <button type="button" id="image-upload-button">Upload</button>
    </form>

    <h2>do some art</h2>

    <section id="art-panel">
        <div id="canvas-container">
            <canvas id="graffiti-canvas" width="128" height="128">
                canvas that you can draw your graffiti on
            </canvas>
            <canvas id="overlay-canvas" width="128" height="128" tabindex="-1" aria-hidden="true">
            </canvas>
        </div>
        <div id="graffiti-canvas-controls">
            <div class="canvas-control-box" id="colour-picker-buttons-container">
                <button id="colour-picker-button" class="canvas-control-button" title="Change brush colour."></button>
                <button id="mask-picker-button" class="canvas-control-button" title="Change mask colour."></button>
            </div>
            <button id="brush-tool-button" class="canvas-control-button" title="Select the brush tool">brush</button>
            <button id="eraser-tool-button" class="canvas-control-button"
                title="Select the eraser tool.">eraser</button>
            <button id="masked-brush-tool-button" class="canvas-control-button"
                title="Select the masked brush tool.">masked<br>brush</button>

            <div style="flex-grow: 1;"></div>

            <button id="clear-canvas-button" class="canvas-control-button" title="Clear the canvas.">
                <img src="/static/images/icons/clear_canvas.png" alt="">
            </button>
        </div>
        <dialog id="colour-picker-dialog">
            <div id="colour-picker-dialog-header">
                <div>
                    <h3>Select Colour</h3>
                    <p>These are the colours that can appear in a Minecraft map in game.</p>
                </div>
                <button id="colour-picker-transparent-swatch" class="colour-picker-swatch" graffiti-palette-index="0">
                </button>
            </div>
            <div id="colour-picker-swatch-box">
            </div>
        </dialog>
    </section>

    <template id="colour-picker-swatch-column-template">
        <div class="colour-picker-swatch-column">
            <button class="colour-picker-swatch"></button>
            <button class="colour-picker-swatch"></button>
            <button class="colour-picker-swatch"></button>
            <button class="colour-picker-swatch"></button>
        </div>
    </template>
</body>

</html>
